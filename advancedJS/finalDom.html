<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserting and deleting elements in dom ( displayed in webpage)</title>
    
</head>
<body style="background-color: #212121; color: #f1f1f1;">

   <ul class="language" > F(x) adding all the languages in the list ( by dom Manipulation)
    <li>javascript</li>
   </ul>

</body>

    <script>
// we wil create a function that will automatically add the newlanguage in the ul-list 

function addOptiLang (newlang){
const li = document.createElement('li');               // creating the element li 
li.appendChild(document.createTextNode(newlang))       // passed text is added in the li that is created
document.querySelector('.language').appendChild(li)   // selecting the list and adding in it
}
// It is the best and optimized way of doing it 



// Adding all the languages or the list items in the ul.
addOptiLang("python")
addOptiLang('swift')
addOptiLang('ruby')



// Edit = to edit/modify   procedure = {select element ,create new element , change the content , lastly replace }


const secondLang=document.querySelector("li:nth-child(2)")
//secondlang.innerHTML= "fahhhhhh"   ; not a optimized approach

const newli = document.querySelector('li')
newli.textContent="fahhhhhhhhhh"

secondLang.replaceWith(newli)       // replacing the element with the new created element   

// edit :     most simple and easy way 

const firstlang= document.querySelector("li:first-child")
firstlang.outerHTML=' <li> Easy way to change li </li>'         // In outerHTML = we have to write the whoe HTML code that should be written.


// Remove/Delete          : easiest thing

const removing = document.querySelector("li:last-child")
removing.remove()                                                           // remove()  : It simply delets the element from the DOM

 
    </script>

</html>
