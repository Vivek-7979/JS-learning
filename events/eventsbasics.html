<script>   // All js is written inside this tag

  }

      //   NOW LET'S COME ON TO THE BEST APPROACH (addEventListner) {select element , jo event hona (click,double,click etc) us pr eventlistner lake , function vich kaam ds dena kya karna}
      //   addEventListner('jo bhi event hona (like-click)' , function(){ sara kaam jo hona , false (default hundi vse teh)})
// All Events in browser => There are total 125 events in browser
//                                                                 like : click , dblclick , mouseover , mouseup , mousedown etc
//                                                                         keydown , keyup , submit , input , change  
//                                                                         touchstart , scroll, drag , play , pause

// // It just tells about all the a to z events in the browser 
//       document.querySelector('#beach').addEventListener('click' , function (e){
//         //alert('beach is clicked again') ;

//       })


document.getElementById('images').addEventListener('click', function(e){
console.log('clicked inside the ul');
},true ) 

// true            = capturing (upr jan ale event nu farna baare ale the thale ) ; clicked inside ul than clicked beach 
// false (default) = bubbling (thale ala event bare de upar chal jana) ; first beach then images clicked 

document.getElementById('beach').addEventListener('click', function(e){
console.log('clicked beach');
e.stopPropagation(); // 3.] it will stop the further propagation ( mtlb hor upar agge kisi kol nhi jana) ; works in bubbling(false)
}, true)
// as beach is also inside the ul so both the events will be activated . therefore : two things happens + 1.] bubbling(false) , 2.] capturing(true)  3.] stopPropagation (bubbling prevent karda)




document.querySelector('#google').addEventListener('click' , function (e) {
e.preventDefault();        // jinda apa click krke usually link pr chal jana ; but je apa prevent default kardeyie taah ohne oh usual kaam nhi karna . [ jadki click teh hona hi ga teh oh jana bhi chaida]
e.stopPropagation();
console.log('google clicked') ;

}, false)



/*   If we click on the images that i will removed from the webpage */

document.querySelector('#images').addEventListener('click', function(e){
 console.log( e.target.tagName);  // there are many methods in the 'e' - object that is passed in the function

 if ( e.target.tagName === 'IMG'){
let removeImg = e.target.parentNode;        // here we are targeting the parentnode of the IMG  i.e.  <li> </li>    => the whole list item including the bulltens
removeImg.remove();                         // the remove method siimply removed the element from the dom
 }
})
