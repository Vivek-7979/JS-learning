<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prevent Default</title>
</head>
<body style="background-color: #212121;">
     <a href="https://www.google.com/" id="google" style="color: aliceblue;">Google</a>
 
</body>

<script>
    document.querySelector('#google').addEventListener('click' , function (e) {
e.preventDefault();        // jinda apa click krke usually link pr chal jana ; but je apa prevent default kardeyie taah ohne oh usual kaam nhi karna . [ jadki click teh hona hi ga teh oh jana bhi chaida]
e.stopPropagation();
console.log('google clicked') ;

}, false)

</script>
</html>
